<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <p id="num1"></p>
    <p id="num2"></p>
    <p id="num3"></p>
    <p id ="num4"></p>
    <p id = "num5"></p>
    <p id ="num6"></p>
    <p id ="num7"></p>
    <script>
        
        let id = prompt("Are you wearing your school ID? (yes/no)");

        if (id.toLowerCase() === "yes") {
            num1.innerHTML = "Welcome to the event!";
        } else if (id.toLowerCase() === "no") {
            num1.innerHTML = "Please show your ID.";
        } else {
            num1.innerHTML = "bro";
        }

        let stud = prompt("Are you a student? (yes/no)");
        let sen = prompt("Are you a senior? (yes/no)");

        if (stud.toLowerCase() === "yes" || sen.toLowerCase() ==="yes"){
            num2.innerHTML =  "You get a discounted fare.";
        } else{
            num2.innerHTML = "You will pay the regular fare";
        }
        
        let score = prompt("Input your quiz score (0-100).");
        let grade = Number(score);

        if (grade > 100){
            num3.innerHTML = "You need to get therapy";
        }else if (grade <= 100 || grade >= 90){
            num3.innerHTML = "Excellent";
        } else if (grade <=89 || grade >=75){
           num3.innerHTML = "Good Job"; 
        } else if (grade <=74 || grade >= 60){
            num3.innerHTML = "You passed";
        }else {
            num3.innerHtml = "You need to review";
        } 
       
        let promo = prompt("Choose A, B, or C.\nA → 1GB for 1 day \nB → 5GB for 7 days \nC → 10GB for 30 days")

        switch (promo.toUpperCase()){
            case "A":
                break;
            case "B":
                break;
            case "C":
                break;
            default:
                num4.innerHTML = "Invalid choice";
    }
        let input = prompt("Enter your full name");
        let name = input.toLowerCase();
        let j = 0;

        for (let i = 0; i < name.length; i++){
            if (name[i] === "a" || name[i] === "e" || name[i] === "i" || name[i] === "o" || name[i] === "u"){
                j++;
            }
        }

        num5.innerHTML = "Your name contains " + j + " vowels.";

        

        let username = prompt("Enter a username");

        for(let i = 0; i < username.length; i++){
            if (username[i] === " "){
                num6.innerHTML = "Username must not contain spaces.";
            } else if (username.length < 6){
                num6.innerHTML = "Username must be at least 6 characters.";
            }else {
                num6. innerHTML = "Valid username.";
            }
        }
        

        let password = "Grade9JS";
        let attempts = 0;

        while (attempts < 3){
            enter = prompt("Enter the password.");
            if (enter == password){
                num7.innerHTML = "Login successful.";
                break;
            }
            attempts++;
        }

        num7.innerHTML = "Account locked."
    </script>
</body>
</html>
